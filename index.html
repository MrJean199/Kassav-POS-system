<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1D9E75">
  <title>Kassav Vero. • POS</title>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  
  <style>
    :root {
      --primary: #1D9E75;
      --primary-dark: #0F6E56;
      --accent: #E67E22;
      --bg: #F8F7F2;
      --card: #FFFFFF;
      --text: #2C2C2C;
      --text-light: #555555;
      --border: #E5E0D8;
      --success: #1D9E75;
      --danger: #E24B4A;
      --free: #8B5CF6;
      --touch-target: 44px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 16px;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 700; letter-spacing: -0.02em; }
    .header p { color: var(--text-light); font-size: clamp(0.9rem, 2vw, 1.05rem); }

    .tabs {
      display: flex; gap: 6px; margin-bottom: 20px; background: white;
      padding: 6px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      width: 100%; max-width: 500px; margin-left: auto; margin-right: auto;
      position: relative; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .tab {
      padding: 12px 16px; border: none; border-radius: 10px; background: transparent;
      font-size: clamp(13px, 2.5vw, 15px); font-weight: 600; color: var(--text-light);
      cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; white-space: nowrap; flex-shrink: 0;
      min-height: var(--touch-target); display: flex; align-items: center;
    }
    .tab:hover { background: #f5f3eb; }
    .tab:active { transform: scale(0.96); }
    .tab.active {
      background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(29,158,117,0.35);
    }

    .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: #E24B4A;
      color: white;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      box-shadow: 0 2px 6px rgba(226,75,74,0.4);
      animation: badgePop 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .notification-badge.show { display: flex; }

    @keyframes badgePop {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pos-wrap { 
      display: grid; 
      grid-template-columns: 1fr 380px; 
      gap: 20px;
      align-items: start;
    }

    .menu-section, .panel {
      background: white; border-radius: 18px; padding: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.05);
    }

    .section-title {
      font-size: clamp(0.85rem, 2vw, 1.1rem); font-weight: 600; color: var(--text-light);
      margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; justify-content: space-between; align-items: center;
    }

    .menu-grid {
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 12px;
    }

    .item-card {
      background: white; border: 1px solid var(--border); border-radius: 16px;
      padding: clamp(14px, 2vw, 20px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .item-card:active { transform: scale(0.97); }

    .item-name { font-size: clamp(1.1rem, 2.5vw, 1.35rem); font-weight: 700; margin-bottom: 6px; }
    .price-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; margin-bottom: 10px; }
    .badge-plain { background: #EDE9E0; color: #5C5544; }
    .badge-special { background: #FEF3C7; color: #92400E; }

    .item-price { font-size: clamp(1.5rem, 3vw, 2.1rem); font-weight: 700; color: var(--primary); margin-bottom: 12px; }

    .qty-row {
      display: flex; align-items: center; justify-content: space-between;
      background: #F8F7F2; border-radius: 12px; padding: 6px; gap: 8px;
    }
    .qty-btn {
      width: clamp(44px, 8vw, 52px); height: clamp(44px, 8vw, 52px);
      border: none; border-radius: 10px; font-size: clamp(22px, 4vw, 26px);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.2s; flex-shrink: 0; user-select: none;
      -webkit-user-select: none;
    }
    .qty-btn.minus { background: #FFF1F1; color: var(--danger); }
    .qty-btn.plus { background: #E6F7F0; color: var(--primary); }
    .qty-btn:active { transform: scale(0.9); }

    .qty-val {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 700;
      min-width: 24px;
      text-align: center;
    }

    .free-btn {
      width: 100%; margin-top: 12px; padding: clamp(12px, 2vw, 14px); border-radius: 12px;
      background: #F3E8FF; color: var(--free); border: 1px solid #C4B5FD;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
      min-height: var(--touch-target); font-size: clamp(13px, 2vw, 14px);
    }
    .free-btn:active { transform: scale(0.97); }
    .free-btn.active {
      background: var(--free); color: white; border-color: var(--free);
    }

    .order-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: clamp(13px, 2vw, 15px); }
    .order-total {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem); font-weight: 700; padding-top: 14px; margin-top: 10px;
      border-top: 2px solid var(--border); display: flex; justify-content: space-between; color: var(--primary);
    }

    .checkout-btn {
      width: 100%; padding: clamp(14px, 2vw, 18px); font-size: clamp(1rem, 2.5vw, 1.2rem); font-weight: 700;
      background: var(--primary); color: white; border: none; border-radius: 14px;
      cursor: pointer; margin-top: 10px; transition: all 0.25s;
      box-shadow: 0 6px 20px rgba(29,158,117,0.35);
      min-height: var(--touch-target);
    }
    .checkout-btn:active { transform: scale(0.97); background: var(--primary-dark); }

    .clear-btn { font-size: 13px; color: var(--danger); background: none; border: none; cursor: pointer; text-decoration: underline; min-height: var(--touch-target); }

    .search-box {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border);
      border-radius: 10px; font-size: 15px; margin-bottom: 14px;
      -webkit-appearance: none;
    }
    .search-box:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }

    .priority-star {
      cursor: pointer; font-size: 1.3rem; color: #ccc; transition: color 0.2s;
      min-width: var(--touch-target); min-height: var(--touch-target);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .priority-star.active { color: #F59E0B; }

    .to-bake {
      background: #FEF3C7; border-radius: 14px; padding: 16px; margin: 16px 0;
    }
    .to-bake h3 { margin-bottom: 14px; color: #92400E; font-size: clamp(0.9rem, 2vw, 1rem); }
    .customer-name { font-size: 11px; color: #92400E; opacity: 0.85; display: inline-block; margin: 2px 4px; }

    .prepaid-toggle { display: flex; align-items: center; gap: 8px; margin: 14px 0; font-weight: 600; color: #1E40AF; min-height: var(--touch-target); }

    .add-po-btn, .po-collect-btn {
      width: 100%; padding: clamp(14px, 2vw, 16px); font-size: clamp(0.95rem, 2vw, 1.1rem); font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer; transition: all 0.25s;
      min-height: var(--touch-target);
    }
    .add-po-btn { background: #185FA5; color: white; }
    .add-po-btn:active { background: #0d4070; transform: scale(0.97); }
    .po-collect-btn { background: var(--primary); color: white; }
    .po-collect-btn:active { background: var(--primary-dark); transform: scale(0.97); }
    .po-delete-btn {
      padding: 12px 18px; background: #FFF1F1; color: var(--danger);
      border: 1px solid #F5B8B8; border-radius: 10px; cursor: pointer;
      min-height: var(--touch-target); min-width: var(--touch-target);
    }
    .po-delete-btn:active { background: #FEE2E2; }

    .connection-status {
      position: fixed;
      top: 12px;
      right: 12px;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 600;
      z-index: 1000;
      pointer-events: none;
    }
    .connection-status.online { background: #D1FAE5; color: #065F46; }
    .connection-status.offline { background: #FEE2E2; color: #991B1B; }

    .notif-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      z-index: 1000;
      display: none;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      color: var(--text);
      font-size: 14px;
      max-width: calc(100vw - 32px);
      width: auto;
    }
    .notif-prompt.show { display: flex; animation: slideUp 0.3s ease; }
    .notif-prompt button {
      padding: 8px 18px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      min-height: 36px;
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    .table-wrap {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      margin: 0 -8px; padding: 0 8px;
    }

    /* ============ MOBILE RESPONSIVE ============ */
    @media (max-width: 900px) {
      .pos-wrap {
        grid-template-columns: 1fr;
      }
      
      .sidebar {
        display: flex; flex-direction: column; gap: 14px;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
        padding-bottom: env(safe-area-inset-bottom, 10px);
      }

      .header h1 { font-size: 1.4rem; }
      .header p { font-size: 0.85rem; }

      .tabs {
        gap: 4px; padding: 4px; border-radius: 12px;
        position: sticky; top: 10px; z-index: 100;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .tab {
        padding: 10px 12px; font-size: 12px; border-radius: 8px;
        min-height: 38px;
      }

      .menu-section, .panel {
        padding: 14px; border-radius: 14px;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
      }

      .item-card {
        padding: 12px; border-radius: 12px;
      }

      .item-price {
        font-size: 1.3rem;
      }

      .qty-btn {
        width: 40px; height: 40px; font-size: 20px; border-radius: 8px;
      }

      .qty-val {
        font-size: 1rem;
      }

      .checkout-btn {
        padding: 14px; font-size: 1rem; border-radius: 12px;
      }

      #page-preorders > div {
        grid-template-columns: 1fr !important;
        gap: 14px;
      }

      #invoice-box {
        padding: 20px 16px !important;
        border-radius: 14px !important;
      }

      #invoice-box table {
        font-size: 13px;
      }

      #invoice-box h3 {
        font-size: 0.95rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 8px;
        padding-bottom: env(safe-area-inset-bottom, 8px);
      }

      .header {
        margin-bottom: 12px;
      }
      .header h1 {
        font-size: 1.2rem;
      }
      .header p {
        font-size: 0.8rem;
      }

      .tabs {
        gap: 2px;
        top: 8px;
      }
      .tab {
        padding: 8px 10px;
        font-size: 11px;
        min-height: 34px;
      }

      .menu-grid {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .item-card {
        padding: 10px;
        border-radius: 10px;
      }

      .item-name {
        font-size: 0.9rem;
      }

      .item-price {
        font-size: 1.1rem;
        margin-bottom: 8px;
      }

      .price-badge {
        font-size: 10px;
        padding: 2px 8px;
      }

      .qty-btn {
        width: 36px;
        height: 36px;
        font-size: 18px;
        border-radius: 8px;
      }

      .qty-val {
        font-size: 0.9rem;
      }

      .free-btn {
        font-size: 12px;
        padding: 10px;
      }

      .checkout-btn {
        font-size: 0.9rem;
        padding: 12px;
      }

      .section-title {
        font-size: 0.8rem;
        margin-bottom: 10px;
      }

      .notif-prompt {
        font-size: 12px;
        padding: 10px 14px;
        bottom: 10px;
      }

      .notif-prompt button {
        font-size: 12px;
        padding: 6px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="connection-status online" id="connection-status">🟢 Connected</div>
  <div class="notif-prompt" id="notif-prompt">
    <span>🔔 Get notified of new orders</span>
    <button onclick="requestNotificationPermission()">Enable</button>
  </div>

  <div class="container">
    <div class="header">
      <h1> Kassav Vero.</h1>
      <p>Fresh • Simple • Delicious</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('pos',this)">🧾 Point of Sale</button>
      <button class="tab" onclick="switchTab('preorders',this)" style="position:relative;">
        📋 Pre-orders
        <span class="notification-badge" id="po-badge">0</span>
      </button>
      <button class="tab" onclick="switchTab('summary',this)">📊 Day Summary</button>
    </div>

    <!-- POS -->
    <div class="page active" id="page-pos">
      <div class="pos-wrap">
        <div class="menu-section">
          <div class="section-title">Menu</div>
          <div class="menu-grid" id="menu-grid"></div>
          <button id="free-all-btn" class="free-btn" onclick="toggleAllFree()">🎟️ Mark All Items as Free</button>
        </div>

        <div class="sidebar">
          <div class="panel">
            <div class="section-title">Current Order</div>
            <div id="order-lines"><p style="text-align:center; color:#888; padding:40px 0;">No items yet</p></div>
            <div class="order-total">
              <span>Total</span>
              <span id="order-total">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkout-btn" disabled onclick="checkout()">Complete Sale</button>
          </div>

          <div class="panel">
            <div class="section-title">
              <span>Today's Sales</span>
              <button class="clear-btn" onclick="clearSales()">Clear Day</button>
            </div>
            <div id="sales-list"></div>
            <div class="order-total" style="margin-top:16px;">
              <span>Day Total</span>
              <span id="day-total">$0.00</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- PRE-ORDERS -->
    <div class="page" id="page-preorders">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
        <div class="panel">
          <div class="section-title">New / Edit Pre-order</div>
          <input id="po-id" type="hidden">

          <div style="margin-bottom:20px;">
            <label style="display:block; font-size:13px; font-weight:600; color:#666; margin-bottom:8px;">Customer Name</label>
            <input id="po-name" placeholder="e.g. Sarah Johnson" style="width:100%; padding:14px 16px; border:1px solid var(--border); border-radius:12px; font-size:15px;">
          </div>

          <div class="prepaid-toggle">
            <input type="checkbox" id="po-prepaid">
            <label for="po-prepaid">This order is Prepaid</label>
          </div>

          <div class="section-title" style="margin:24px 0 16px;">Select Items</div>
          <div id="po-item-grid"></div>

          <div style="margin:28px 0; display:flex; justify-content:space-between; align-items:center; font-size:clamp(1rem, 2vw, 1.15rem);">
            <span style="color:#666;">Order Total</span>
            <span id="po-preview-total" style="font-weight:700; color:var(--primary); font-size:clamp(1.3rem, 3vw, 1.7rem);">$0.00</span>
          </div>

          <button class="add-po-btn" id="save-po-btn" onclick="savePreorder()">Save Pre-order</button>
        </div>

        <div>
          <div class="panel">
            <div class="section-title">Kassavas to make Today</div>
            <div id="to-bake-list" class="to-bake"></div>
          </div>

          <div class="panel" style="margin-top:24px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
              <div class="section-title" style="margin:0;">Pending Pre-orders</div>
              <input type="file" id="csv-import" accept=".csv" style="display:none;" onchange="importCSV(this)">
              <button onclick="document.getElementById('csv-import').click()" style="padding:8px 16px; background:var(--primary); color:white; border:none; border-radius:12px; cursor:pointer; font-size:14px;">Import CSV</button>
            </div>
            <input type="text" id="po-search" class="search-box" placeholder="Search customer name..." onkeyup="renderPoList()">
            <div id="po-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="page" id="page-summary">
      <div id="invoice-box" style="background:white; border-radius:24px; padding:40px 50px; box-shadow:0 15px 40px rgba(0,0,0,0.1); max-width:820px; margin:0 auto;">
      </div>
    </div>
  </div>

  <script>
    // ==================== FIREBASE SETUP ====================
    const firebaseConfig = {
      apiKey: "AIzaSyD8pNws60ZIdSXfbWmbIC7H3EOQwjIH7bw",
      authDomain: "pos-system-45a85.firebaseapp.com",
      databaseURL: "https://pos-system-45a85-default-rtdb.firebaseio.com",
      projectId: "pos-system-45a85",
      storageBucket: "pos-system-45a85.firebasestorage.app",
      messagingSenderId: "626364063546",
      appId: "1:626364063546:web:d0c6d73837e00d5d747a03",
      measurementId: "G-9SXNLQ4GSL"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // ==================== DATA & ITEMS ====================
    const ITEMS = [
      {id:'sweet', name:'Plain Sweet', price:7, tier:'plain'},
      {id:'salt',  name:'Salt', price:7, tier:'plain'},
      {id:'choc',  name:'Chocolate Chip', price:8, tier:'special'},
      {id:'cherry',name:'Cherry Raisin', price:8, tier:'special'},
      {id:'cran',  name:'Cranberry', price:8, tier:'special'},
      {id:'ginger',name:'Ginger', price:8, tier:'special'},
      {id:'Spicy',name:'Spicy', price:8, tier:'special'},
    ];

    let order = {};
    let isAllFree = false;
    let editingPoId = null;
    let poOrder = {};
    let sales = [];
    let preorders = [];
    let txCount = 0;
    let poCount = 0;
    let flavourTotals = {};
    let deviceId = 'device_' + Math.random().toString(36).substr(2, 9);
    let newPoCount = 0;
    let lastKnownPoIds = new Set();
    let notificationEnabled = false;
    
    ITEMS.forEach(i => flavourTotals[i.id] = 0);

    const fmt = n => '$' + n.toFixed(2);
    const today = () => new Date().toLocaleDateString([], {year:'numeric', month:'long', day:'numeric'});
    const timeNow = () => new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    // ====================== NOTIFICATION SYSTEM ======================
    
    function checkNotificationSupport() {
      if ('Notification' in window && 'serviceWorker' in navigator) {
        if (Notification.permission === 'granted') {
          notificationEnabled = true;
        } else if (Notification.permission === 'default') {
          setTimeout(() => {
            document.getElementById('notif-prompt').classList.add('show');
          }, 3000);
        }
      }
    }

    function requestNotificationPermission() {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          notificationEnabled = true;
          document.getElementById('notif-prompt').classList.remove('show');
          showNotification('Kassav Vero.', '🔔 Notifications enabled! You\'ll be alerted of new orders.');
        }
      });
    }

    function showNotification(title, body) {
      if (!notificationEnabled) return;
      
      if ('Notification' in window && Notification.permission === 'granted') {
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
          navigator.serviceWorker.ready.then(registration => {
            registration.showNotification(title, {
              body: body,
              icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%231D9E75"/><text x="50" y="65" text-anchor="middle" fill="white" font-size="40" font-weight="bold">K</text></svg>',
              badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%231D9E75"/><text x="50" y="65" text-anchor="middle" fill="white" font-size="40" font-weight="bold">K</text></svg>',
              vibrate: [200, 100, 200],
              tag: 'kassav-vero-notification'
            });
          });
        } else {
          new Notification(title, {
            body: body,
            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%231D9E75"/></svg>'
          });

    // ====================== FIREBASE SYNC ======================
    
    const connectedRef = database.ref('.info/connected');
    connectedRef.on('value', (snap) => {
      const status = document.getElementById('connection-status');
      if (snap.val() === true) {
        status.textContent = '🟢';
        status.className = 'connection-status online';
      } else {
        status.textContent = '🔴';
        status.className = 'connection-status offline';
      }
    });

    const presenceRef = database.ref('presence');
    presenceRef.child(deviceId).set({
      lastSeen: firebase.database.ServerValue.TIMESTAMP,
      device: navigator.userAgent.includes('Mobile') ? '📱 Mobile' : '💻 Desktop'
    });
    presenceRef.child(deviceId).onDisconnect().remove();

    // Listen for sales changes - RECALCULATE flavourTotals FROM SCRATCH
    database.ref('sales').on('value', (snapshot) => {
      const data = snapshot.val();
      sales = data ? Object.values(data) : [];
      txCount = sales.length;
      
      // Reset and recalculate - no double counting
      ITEMS.forEach(i => flavourTotals[i.id] = 0);
      sales.forEach(s => {
        if (s.items && !s.isPrepaid) {
          s.items.forEach(i => {
            flavourTotals[i.id] = (flavourTotals[i.id] || 0) + i.qty;
          });
        }
      });
      
      renderSalesList();
      renderInvoice();
    });

    // Listen for preorders changes
    database.ref('preorders').on('value', (snapshot) => {
      const data = snapshot.val();
      const newPreorders = data ? Object.values(data) : [];
      
      if (preorders.length > 0) {
        const currentIds = new Set(newPreorders.map(p => p.id));
        
        newPreorders.forEach(po => {
          if (!lastKnownPoIds.has(po.id) && lastKnownPoIds.size > 0) {
            newPoCount++;
            updateBadge();
            showNotification('📋 New Order!', `${po.name} placed an order for ${po.items.map(i => i.name + ' ×' + i.qty).join(', ')}`);
          }
          
          if (po.collected && lastKnownPoIds.has(po.id)) {
            const oldPo = preorders.find(p => p.id === po.id);
            if (oldPo && !oldPo.collected) {
              showNotification('✅ Order Collected', `${po.name} collected their order.`);
            }
          }
        });
        
        lastKnownPoIds = currentIds;
      } else {
        lastKnownPoIds = new Set(newPreorders.map(p => p.id));
      }
      
      preorders = newPreorders;
      poCount = preorders.length;
      
      renderPoList();
      renderToBake();
      renderInvoice();
    });

      const badge = document.getElementById('po-badge');
      if (newPoCount > 0) {

        badge.classList.add('show');
      } else {
        badge.classList.remove('show');
      }

      const salesObj = {};
      sales.forEach(s => {
        salesObj[s.id] = s;
      });
      database.ref('sales').set(salesObj);
    }

    function savePreordersToFirebase() {
      const preordersObj = {};
      preorders.forEach(p => {

      database.ref('preorders').set(preordersObj);

      renderOrder();

    function orderTotal() {
      return ITEMS.reduce((sum, i) => sum + (order[i.id] || 0) * (isAllFree ? 0 : i.price), 0);
    }

    function renderOrder() {
      const lines = ITEMS.filter(i => (order[i.id] || 0) > 0);
      const ol = document.getElementById('order-lines');
      const btn = document.getElementById('checkout-btn');

      if (!lines.length) {
        ol.innerHTML = '<p style="text-align:center; color:#888; padding:40px 0;">No items yet</p>';
        btn.disabled = true;
      } else {
        ol.innerHTML = lines.map(i => `

            <span>${i.name} ×${order[i.id]}${isAllFree ? ' <span style="color:var(--free);font-size:13px;">(Free)</span>' : ''}</span>

          </div>

      }
      document.getElementById('order-total').textContent = fmt(orderTotal());
    }

    function checkout() {
      const lines = ITEMS.filter(i => (order[i.id] || 0) > 0);
      if (!lines.length) return;

      const btn = document.getElementById('checkout-btn');
      btn.style.background = 'var(--primary-dark)';
      setTimeout(() => btn.style.background = '', 600);

      const items = lines.map(i => ({
        id: i.id,
        name: i.name,
        price: isAllFree ? 0 : i.price,
        qty: order[i.id],
        free: isAllFree
      }));
      
      recordSale(items, orderTotal(), "Walk-in");

      order = {};
      isAllFree = false;
      document.getElementById('free-all-btn').classList.remove('active');
      document.getElementById('free-all-btn').textContent = "🎟️ Mark All Items as Free";
      ITEMS.forEach(i => {
        const el = document.getElementById(`qty-${i.id}`);
        if (el) el.textContent = 0;
      });
      renderOrder();
    }

    function recordSale(items, total, label = "", preorderId = null, isPrepaid = false) {
      const nextId = sales.length > 0 ? Math.max(...sales.map(s => s.id)) + 1 : 1;
      
      const summary = items.map(i => `${i.name} x${i.qty}${i.free ? ' (Free)' : ''}`).join(', ');
      
      const newSale = {
        id: nextId,
        time: timeNow(),
        summary,
        total: isPrepaid ? 0 : total,
        label,
        items,
        preorderId,
        isPrepaid,
        deviceId
      };
      
      sales.push(newSale);
      saveSalesToFirebase();
      // REMOVED: manual flavourTotals update - Firebase listener handles it
    }

    function deleteSale(id) {
      const sale = sales.find(s => s.id === id);
      if (!sale) return;
      
      if (sale.preorderId) {
        const po = preorders.find(p => p.id === sale.preorderId);
        if (po) {
          po.collected = false;
          savePreordersToFirebase();
        }
      }
      
      sales = sales.filter(s => s.id !== id);
      saveSalesToFirebase();
    }

    function savePreorder() {
      const name = document.getElementById('po-name').value.trim();
      if (!name) return alert('Please enter a customer name.');

      const items = ITEMS.filter(i => (poOrder[i.id] || 0) > 0)

      const isPrepaid = document.getElementById('po-prepaid').checked;
      const total = items.reduce((s, i) => s + i.price * i.qty, 0);

      if (editingPoId) {

          po.name = name;
          po.items = items;

        const nextId = preorders.length > 0 ? Math.max(...preorders.map(p => p.id)) + 1 : 1;

          items,

    // ====================== CSV IMPORT ======================
    function importCSV(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const csv = e.target.result;
        const lines = csv.trim().split('\n');
        if (lines.length < 2) {
          alert("CSV file is empty or invalid.");
          return;
        }

        const headers = lines[0].split(',').map(h => h.trim());
        const nameIndex = headers.findIndex(h => h.toLowerCase().includes('customer') || h.toLowerCase().includes('name'));

        if (nameIndex === -1) {
          alert("CSV must have a column with 'Customer Name' or similar.");
          return;
        }

        let added = 0;
        const nextId = preorders.length > 0 ? Math.max(...preorders.map(p => p.id)) + 1 : 1;

        for (let i = 1; i < lines.length; i++) {
          const values = lines[i].split(',').map(v => v.trim());
          if (!values[nameIndex]) continue;

          const customerName = values[nameIndex];
          const items = [];
          let total = 0;

          ITEMS.forEach((item, idx) => {
            const colIndex = headers.findIndex(h => h.toLowerCase().includes(item.name.toLowerCase().replace(/ /g,'')));
            if (colIndex !== -1) {
              const qty = parseInt(values[colIndex]) || 0;
              if (qty > 0) {
                items.push({id: item.id, name: item.name, price: item.price, qty});
                total += item.price * qty;
              }
            }
          });

          if (items.length > 0) {
            preorders.push({
              id: nextId + added,
              name: customerName,
              items,
              total,
              collected: false,
              isPrepaid: false,
              priority: false,
              deviceId
            });
            added++;
          }
        }

        savePreordersToFirebase();
        alert(`Successfully imported ${added} pre-order(s) from CSV!`);
        input.value = '';
      };
      reader.readAsText(file);
    }

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-bottom:30px;">
          <div style="background:#F8F7F2; padding:clamp(14px,2vw,20px); border-radius:14px; text-align:center;">
            <div style="font-size:clamp(1.3rem,3vw,2rem); font-weight:700;">${txns}</div>
            <div style="color:#666; font-size:clamp(11px,2vw,13px);">Transactions</div>
          </div>
          <div style="background:#F8F7F2; padding:clamp(14px,2vw,20px); border-radius:14px; text-align:center;">
            <div style="font-size:clamp(1.3rem,3vw,2rem); font-weight:700;">${totalSold}</div>
            <div style="color:#666; font-size:clamp(11px,2vw,13px);">Kassavas Sold</div>
          </div>
          <div style="background:#F8F7F2; padding:clamp(14px,2vw,20px); border-radius:14px; text-align:center;">
            <div style="font-size:clamp(1.3rem,3vw,2rem); font-weight:700;">${preorders.filter(p=>p.collected).length}</div>
            <div style="color:#666; font-size:clamp(11px,2vw,13px);">Orders fullfilled</div>
          </div>
        </div>

        <h3 style="margin:24px 0 14px; font-size:clamp(0.9rem,2vw,1.1rem); color:#555;">Flavour Breakdown</h3>
        <div class="table-wrap">
        <table style="width:100%; border-collapse:collapse; margin-bottom:30px; min-width:350px;">
          <thead>
            <tr style="border-bottom:2px solid #ddd;">
              <th style="text-align:left; padding:8px 0; font-weight:600; font-size:clamp(11px,2vw,13px);">Flavour</th>
              <th style="text-align:right; padding:8px 0; font-weight:600; font-size:clamp(11px,2vw,13px);">Price</th>
              <th style="text-align:right; padding:8px 0; font-weight:600; font-size:clamp(11px,2vw,13px);">Qty</th>
              <th style="text-align:right; padding:8px 0; font-weight:600; font-size:clamp(11px,2vw,13px);">Amount</th>
            </tr>
          </thead>
          <tbody>${flavourRows}</tbody>
        </table>
        </div>

        <div style="border-top:3px solid #ddd; padding-top:20px; font-size:clamp(1.3rem,3vw,1.6rem); font-weight:700; display:flex; justify-content:space-between;">
          <span>Total Earned</span>
          <span style="color:var(--primary);">${fmt(totalEarned)}</span>
        </div>

        <h3 style="margin:30px 0 14px; font-size:clamp(0.9rem,2vw,1.1rem); color:#555;">Transaction Log</h3>
        <div>${txRows}</div>

        <div style="text-align:center; margin-top:40px; color:#888; font-size:clamp(12px,2vw,14px);">
          Thank you for supporting Kassav Vero. ❤️
        </div>
      `;
    }

    function clearSales() {
      if (!confirm('Clear all sales and reset the day?')) return;
      
      database.ref('sales').set(null);
      database.ref('preorders').set(null);
      
      sales = [];
      preorders = [];
      txCount = 0;
      poCount = 0;
      newPoCount = 0;
      lastKnownPoIds = new Set();
      updateBadge();
      ITEMS.forEach(i => flavourTotals[i.id] = 0);
      
      renderSalesList();
      renderPoList();
      renderToBake();
    }

    function switchTab(id, el) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      el.classList.add('active');
      
      if (id === 'preorders') {
        newPoCount = 0;
        updateBadge();
      }
      
      if (id === 'summary') renderInvoice();
      if (id === 'preorders') renderToBake();
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Initialize
    renderMenu();
    renderPoItemGrid();
    renderSalesList();
    renderPoList();
    renderToBake();
    checkNotificationSupport();
  </script>
</body>
</html>
